name: devprod
region: lon

services:
  - name: api
    source_dir: /
    git:
      repo_clone_url: https://github.com/natnew/DevProd.git
      branch: main
    dockerfile_path: apps/api/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: APP_BASE_URL
        scope: RUN_TIME
        value: https://REPLACE_AFTER_CREATE.ondigitalocean.app
      - key: API_BASE_URL
        scope: RUN_TIME
        value: https://REPLACE_AFTER_CREATE.ondigitalocean.app/api
      - key: DEMO_MODE
        scope: RUN_TIME
        value: "true"
      - key: DEVPROD_ENABLE_AUTH
        scope: RUN_TIME
        value: "true"
      - key: DEVPROD_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_STRONG_API_KEY
      - key: DEVPROD_RATE_LIMIT_PER_MINUTE
        scope: RUN_TIME
        value: "60"
      - key: DEVPROD_ALLOWED_ORIGINS
        scope: RUN_TIME
        value: https://REPLACE_AFTER_CREATE.ondigitalocean.app
      - key: DEVPROD_RUN_HISTORY_DB_PATH
        scope: RUN_TIME
        value: /tmp/devprod_history.sqlite3
      - key: GRADIENT_API_BASE_URL
        scope: RUN_TIME
        value: ""
      - key: GRADIENT_MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""

  - name: web
    source_dir: /
    git:
      repo_clone_url: https://github.com/natnew/DevProd.git
      branch: main
    dockerfile_path: apps/web/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: API_BASE_URL
        scope: RUN_TIME
        value: https://REPLACE_AFTER_CREATE.ondigitalocean.app/api
      - key: INTERNAL_API_BASE_URL
        scope: RUN_TIME
        value: http://api:8000
      - key: NEXT_PUBLIC_API_BASE_URL
        scope: RUN_TIME
        value: /api

ingress:
  rules:
    - component:
        name: api
      match:
        path:
          prefix: /api
    - component:
        name: web
      match:
        path:
          prefix: /
